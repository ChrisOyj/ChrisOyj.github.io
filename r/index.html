<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>포커의신 핸드 리플레이</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: -apple-system, system-ui, "Apple SD Gothic Neo", sans-serif;
           background: linear-gradient(#155a3c, #08291c); color:#f1f5f4; margin:0;
           display:grid; place-items:center; min-height:100vh; }
    .card { text-align:center; padding:28px 24px; max-width:340px; }
    .spade { font-size:54px; line-height:1; color:#e3b23c; }
    h1 { font-size:20px; margin:14px 0 6px; }
    p { color:#9fb1a8; line-height:1.55; font-size:14px; }
    .btn { display:inline-block; margin-top:14px; padding:14px 26px; border-radius:12px;
           color:#fff; font-weight:800; text-decoration:none; font-size:15px; }
    .btn.app { background:#2fb573; }
    .btn.web { background:#2d6cdf; }
    .hint { margin-top:14px; font-size:12px; color:#7d8f87; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spade">&spades;</div>
    <h1>포커의신 핸드</h1>
    <p>공유된 핸드 리플레이입니다.<br>앱이 있으면 앱에서, 없으면 웹에서 열립니다.</p>
    <a id="open" class="btn app" href="#">앱에서 열기</a><br>
    <a id="web" class="btn web" href="#">웹에서 보기</a>
    <p class="hint">자동으로 안 열리면 위 버튼을 눌러주세요.</p>
  </div>
  <script>
    (function () {
      var pkg = 'com.joon.hand_review_app';
      // Payload rides in the URL fragment (app share) or the `d` query.
      var payload = (location.hash || '').slice(1) ||
        (new URLSearchParams(location.search).get('d') || '');
      // Web replay link (works in any browser, no app needed).
      var webUrl = 'https://chrisoyj.github.io/pokergod/?d=' +
        encodeURIComponent(payload);
      // intent:// targets the app by package (path /r matches its App Link).
      // browser_fallback_url sends users WITHOUT the app to the web replay.
      var intentUrl = 'intent://chrisoyj.github.io/r?d=' +
        encodeURIComponent(payload) +
        '#Intent;scheme=https;package=' + pkg +
        ';S.browser_fallback_url=' + encodeURIComponent(webUrl) + ';end';
      document.getElementById('open').setAttribute('href', intentUrl);
      document.getElementById('web').setAttribute('href', webUrl);
      if (!payload) return;
      var isAndroid = /android/i.test(navigator.userAgent);
      if (isAndroid) {
        // Try the app; if it's not installed Chrome follows the fallback URL.
        setTimeout(function () { window.location.href = intentUrl; }, 300);
      } else {
        // iOS / desktop have no native app — go straight to the web replay.
        window.location.replace(webUrl);
      }
    })();
  </script>
</body>
</html>
